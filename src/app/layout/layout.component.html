<div class="page-wrapper">

  <!-- Sidebar único para todas las rutas admin -->
  <app-sidebar *ngIf="isAdminRoute()"
    [collapsed]="sidebarCollapsed"
    (collapsedChange)="sidebarCollapsed = $event">
  </app-sidebar>

  <main [class.main-content]="isAdminRoute()"
        [class.sidebar-expanded]="isAdminRoute() && !sidebarCollapsed"
        [class.sidebar-collapsed]="isAdminRoute() && sidebarCollapsed">
    <ion-router-outlet></ion-router-outlet>
  </main>

</div>
