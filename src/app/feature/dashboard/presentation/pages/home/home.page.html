<ion-content [fullscreen]="true">
  <div class="home-wrapper">
    <div class="background-overlay"></div>
    
    <div class="header-logo animate-in">
        <img src="assets/img/LogoPasionyFuror.png" alt="Logo Pasion y Furor">
    </div>

    <div class="selection-container">
        <div class="selection-card teacher-card animate-in-up" (click)="navigateTo('teacher')">
            <div class="card-glow"></div>
            <div class="card-icon-wrapper teacher-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 21a8 8 0 0 0-16 0"/>
                    <circle cx="10" cy="8" r="5"/>
                    <path d="M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3"/>
                </svg>
            </div>
            <div class="card-content">
                <h2 class="card-title">Profesor</h2>
                <p class="card-description">Accede al panel de administración y gestión de clases.</p>
            </div>
            <div class="card-arrow">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </div>
        </div>

        <div class="selection-card student-card animate-in-up" style="animation-delay: 0.1s" (click)="navigateTo('student')">
            <div class="card-glow"></div>
            <div class="card-icon-wrapper student-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                </svg>
            </div>
            <div class="card-content">
                <h2 class="card-title">Alumno</h2>
                <p class="card-description">Regístrate, Haz el registro de asistencia de tu clase.</p>
            </div>
             <div class="card-arrow">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </div>
        </div>
    </div>

    <div class="footer-text animate-in">
        <p>&copy; 2024 Furor y Pasión. Todos los derechos reservados.</p>
    </div>
  </div>
</ion-content>
