<div class="ph-header">
  <div class="ph-title-section">
    <div class="ph-icon-box" *ngIf="icon">
      <i class="bi" [ngClass]="icon"></i>
    </div>
    <div class="ph-text">
      <h1 class="ph-title">{{ title }}</h1>
      <p class="ph-subtitle" *ngIf="subtitle">{{ subtitle }}</p>
    </div>
  </div>
  <!-- Slot para botones de acción -->
  <div class="ph-actions">
    <ng-content></ng-content>
  </div>
</div>
