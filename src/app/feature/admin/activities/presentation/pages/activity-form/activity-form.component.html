<div class="activity-form-layout">
  <!-- SIDEBAR (Fijo) -->
  <app-sidebar [collapsed]="sidebarCollapsed" (collapsedChange)="onSidebarToggle($event)"></app-sidebar>

  <!-- ESPACIADOR (Ocupa el espacio del sidebar en el flujo flex) -->
  <aside class="sidebar-spacer" [class.collapsed]="sidebarCollapsed"></aside>

  <div class="activity-form-container">
    <div class="form-header">
      <h2>{{ isEditMode ? 'Editar Actividad' : 'Nueva Actividad' }}</h2>
      <p>Completa la información del evento</p>
    </div>

    <form [formGroup]="activityForm" (ngSubmit)="onSubmit()" class="activity-form">
      <div class="form-grid">
        <!-- Left Column: Basic Info -->
        <div class="form-column">
          <div class="input-group">
            <label for="title">Título de la Actividad</label>
            <input id="title" type="text" formControlName="title" placeholder="Ej: Clase Abierta de Flamenco">
            <div class="error-msg" *ngIf="activityForm.get('title')?.touched && activityForm.get('title')?.invalid">
              El título es requerido (mín. 5 caracteres)
            </div>
          </div>

          <div class="input-group">
            <label>Imagen del Evento</label>
            <div class="image-upload-box" [class.has-image]="imageUrl">
              <img *ngIf="imageUrl" [src]="imageUrl" alt="Preview">
              <div class="upload-placeholder" *ngIf="!imageUrl">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>Click para subir imagen</span>
                <!-- Web: input file nativo del browser -->
                <input *ngIf="!isNative" type="file" (change)="onFileSelected($event)" accept="image/*">
                <!-- Móvil: botón que abre la galería con Capacitor -->
                <button *ngIf="isNative" type="button" class="btn-pick-native" (click)="openImagePicker()">
                  Seleccionar de galería
                </button>
              </div>
              <button type="button" class="btn-remove-image" *ngIf="imageUrl" (click)="removeImage()">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>

          <div class="input-group">
            <label for="description">Descripción</label>
            <textarea id="description" formControlName="description" rows="4" placeholder="Detalles del evento..."></textarea>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label for="eventDate">Fecha</label>
              <input id="eventDate" type="date" formControlName="eventDate">
            </div>
            <div class="input-group">
              <label for="eventTime">Hora</label>
              <input id="eventTime" type="time" formControlName="eventTime">
            </div>
          </div>
        </div>

        <!-- Right Column: Invitations -->
        <div class="form-column">
          <div class="input-group">
            <label>Invitar por Email</label>
            <div class="email-input-wrapper">
              <input type="email" #emailInput placeholder="correo@ejemplo.com" (keydown.enter)="addEmail($event, emailInput)">
              <button type="button" class="btn-add-email" (click)="addEmail($event, emailInput)">
                <i class="fas fa-plus"></i>
              </button>
            </div>
            <div class="email-tags">
              <span class="email-tag" *ngFor="let email of activityForm.get('invitedEmails')?.value">
                {{ email }}
                <i class="fas fa-times" (click)="removeEmail(email)"></i>
              </span>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="onCancel()" [disabled]="isSaving">Cancelar</button>
        <button type="submit" class="btn-primary" [disabled]="activityForm.invalid || isSaving">
          <i class="fas fa-save"></i>
          {{ isSaving ? 'Guardando...' : (isEditMode ? 'Actualizar' : 'Crear Actividad') }}
        </button>
      </div>
    </form>

    <!-- Floating Action Button for Mobile -->
    <ion-fab slot="fixed" vertical="bottom" horizontal="end" class="d-md-none">
      <ion-fab-button color="danger" (click)="onSubmit()" [disabled]="activityForm.invalid || isSaving">
        <ion-icon *ngIf="!isSaving" name="save-outline"></ion-icon>
        <ion-spinner *ngIf="isSaving" name="crescent"></ion-spinner>
      </ion-fab-button>
    </ion-fab>

    <div class="loading-overlay" *ngIf="isLoading">
      <div class="spinner"></div>
    </div>
  </div>
</div>
